name: bear_game
description: Educational 2D game for learning multiplication with a polar bear cub.
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.37.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - public/assets/main_screen/main_screen_bear_bg.png
    - assets/images/map/progression_map.png
    - assets/images/bear_cub/bear_cub_base.png
    - assets/images/locations/snowy_clearing/01_sky.png
    - assets/images/locations/snowy_clearing/02_far_hills.png
    - assets/images/locations/snowy_clearing/03_mid_forest.png
    - assets/images/locations/snowy_clearing/04_ground_platform.png
    - assets/images/
    - assets/audio/
    - assets/data/
